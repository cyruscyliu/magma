###
# Configuration parameters for poppler PoCs
# Variables available to use in bug commands:
# - env CRASH_INPUT: /test/crash_input (from run_pocs.sh)
# - env CRASH_OUTPUT: /test/crash_output (from run_pocs.sh)
# - env CRASH_OUTPUT_NULL: /dev/null (from run_pocs.sh)
###

##
# Which poppler bugs to build PoCs for. default: None
##
php_BUGS=(PHP001)

##
# Commands to reproduce PoC for each specified bug
## 
PHP001_COMMAND="php -v"
